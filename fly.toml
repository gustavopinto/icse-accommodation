# fly.toml - Configuração do app no Fly.io
# Ajuste o nome "icse-accomodation" com: fly apps rename <novo-nome>
# Ou crie um app novo: fly launch (ele pode gerar outro fly.toml)

app = "icse-accomodation"
primary_region = "gru"  # São Paulo - altere se quiser outra região

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[deploy]
  release_command = "flask --app wsgi.py db upgrade"
  strategy = "rolling"

kill_signal = "SIGTERM"
kill_timeout = 120
